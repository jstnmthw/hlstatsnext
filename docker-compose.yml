# Local development containers for hlstatsnext.
# Usage:
#   pnpm docker:up         - Start local development database
#   pnpm docker:down       - Stop development database
#
# For test database, see docker-compose.test.yml
# For production, see docker-compose.prod.yml
name: hlstatsnext-dev

services:
  db:
    image: mysql:8.4
    container_name: hlstatsnext-dev-db
    command: mysqld --mysql-native-password=ON
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - MYSQL_USER=${DB_USER:-hlstatsnext}
      - MYSQL_PASSWORD=${DB_PASS:-hlstatsnext}
      - MYSQL_DATABASE=${DB_NAME:-hlstatsnext}
    volumes:
      - db-volume:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - 3306:3306 # MySQL port
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    container_name: hlstatsnext-dev-rabbitmq
    hostname: hlstatsnext-dev-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-hlstats}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-hlstats}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-hlstats}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE:-hlstats-cookie}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "5672:5672" # AMQP
      - "127.0.0.1:15672:15672" # Management UI (localhost only)
      - "15692:15692" # Prometheus scrape endpoint (rabbitmq_prometheus plugin)
    networks:
      - default
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  daemon:
    build:
      context: .
      dockerfile: ./apps/daemon/Dockerfile
    container_name: hlstatsnext-dev-daemon
    hostname: hlstatsnext-dev-daemon
    volumes:
      - ./:/app
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=mysql://${DB_USER:-hlstatsnext}:${DB_PASS:-hlstatsnext}@db:3306/${DB_NAME:-hlstatsnext}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-hlstats}:${RABBITMQ_PASSWORD:-hlstats}@rabbitmq:5672/${RABBITMQ_VHOST:-hlstats}
      - UDP_PORT=27500
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - METRICS_PORT=9091 # Metrics endpoint for Prometheus
    working_dir: /app/apps/daemon
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "27500:27500/udp" # UDP port for game server logs
      - "9091:9091" # Metrics endpoint
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: hlstatsnext-network
    driver: bridge

volumes:
  db-volume:
  rabbitmq-data:
