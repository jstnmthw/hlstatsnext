# Opt-in observability stack for hlstatsnext.
# Usage:
#   pnpm docker:obs:up     - Start Prometheus + Grafana
#   pnpm docker:obs:down   - Stop them
#   pnpm docker:obs:logs   - Tail combined logs
#
# Prometheus + Grafana attach to the same bridge network the main stack uses
# (hlstatsnext-network), so they can scrape rabbitmq:15692 and reach host
# processes via host.docker.internal. Start the main stack first with
# `pnpm docker:up`, otherwise the external network won't exist yet.
name: hlstatsnext-observability

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: hlstatsnext-dev-prometheus
    hostname: hlstatsnext-dev-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway" # Enable host.docker.internal on Linux
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090" # Prometheus UI
    networks:
      - default
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: hlstatsnext-dev-grafana
    hostname: hlstatsnext-dev-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000" # Grafana UI (using 3001 to avoid conflict with web app on 3000)
    networks:
      - default
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    name: hlstatsnext-network
    external: true

volumes:
  prometheus-data:
  grafana-data:
